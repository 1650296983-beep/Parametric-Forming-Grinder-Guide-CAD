name: Validate Windows desktop package

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

concurrency:
  group: validate-windows-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: windows-latest
    timeout-minutes: 90
    permissions:
      contents: read
    steps:
      - name: Checkout selected commit
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-packaging.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Verify unified SemVer
        run: python scripts/check_versions.py

      - name: Install Python dependencies
        run: python -m pip install -r requirements-packaging.txt

      - name: Run full Python tests
        env:
          MPLCONFIGDIR: ${{ runner.temp }}\matplotlib
        run: python -m pytest

      - name: Run all seven machine regressions
        shell: pwsh
        env:
          MPLCONFIGDIR: ${{ runner.temp }}\matplotlib
        run: |
          python scripts/run_regression_tests.py
          python -c "import json; p=json.load(open('tests/regression/regression_summary.json', encoding='utf-8')); assert p['total_cases']==7 and p['passed']==7 and p['failed']==0, p"

      - name: Install, build, and audit frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
          npm audit --audit-level=low

      - name: Build PyInstaller onedir sidecar
        run: python -m PyInstaller --noconfirm --clean packaging/pyinstaller/forming_grinder_cad.spec

      - name: Smoke-test packaged sidecar
        run: python scripts/smoke_sidecar.py dist/forming_grinder_cad_sidecar/forming_grinder_cad_sidecar.exe

      - name: Disable updater artifacts for this validation build
        shell: pwsh
        run: |
          @{
            bundle = @{
              createUpdaterArtifacts = $false
            }
          } | ConvertTo-Json -Depth 4 | Set-Content -Encoding utf8 "$env:RUNNER_TEMP\tauri-validation.json"

      - name: Build non-release NSIS package
        shell: pwsh
        run: |
          & frontend/node_modules/.bin/tauri.cmd build --bundles nsis --config "$env:RUNNER_TEMP\tauri-validation.json" 2>&1 |
            Tee-Object -FilePath "$env:RUNNER_TEMP\tauri-validation-build.log"
          if ($LASTEXITCODE -ne 0) { throw "Tauri NSIS validation build failed." }
          $bundleTypeWarning = Select-String -Path "$env:RUNNER_TEMP\tauri-validation-build.log" `
            -Pattern "Failed to add bundler type to the binary"
          if ($bundleTypeWarning) {
            $bundleTypeWarning | ForEach-Object { Write-Error $_.Line }
            throw "Updater bundle type marker is missing; validation package is not update-safe."
          }

      - name: Verify and summarize validation artifact
        shell: pwsh
        run: |
          $installer = Get-ChildItem "src-tauri/target/release/bundle/nsis/*-setup.exe" | Select-Object -First 1
          if (-not $installer -or $installer.Length -le 0) {
            throw "NSIS validation installer was not generated."
          }
          $unexpectedSignatures = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.sig" -ErrorAction SilentlyContinue
          if ($unexpectedSignatures) {
            throw "Validation workflow must not produce updater signatures."
          }
          $hash = Get-FileHash $installer.FullName -Algorithm SHA256
          "$($hash.Hash.ToLower())  $($installer.Name)" | Set-Content -Encoding ascii WINDOWS-VALIDATION-SHA256.txt
          @(
            "commit_sha=$env:GITHUB_SHA",
            "git_ref=$env:GITHUB_REF",
            "installer=$($installer.Name)",
            "python=$((python --version) 2>&1)",
            "node=$(node --version)",
            "rust=$(rustc --version)",
            "machine_regressions=7/7",
            "release_created=false",
            "updater_artifacts_created=false"
          ) | Set-Content -Encoding utf8 WINDOWS-VALIDATION-SUMMARY.txt

      - name: Upload test installer without publishing a Release
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-validation-${{ github.run_number }}
          if-no-files-found: error
          retention-days: 14
          path: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            WINDOWS-VALIDATION-SHA256.txt
            WINDOWS-VALIDATION-SUMMARY.txt
