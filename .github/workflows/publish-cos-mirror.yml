name: Publish approved release to Tencent COS

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing published stable SemVer tag, for example v1.0.3"
        required: true
        type: string

concurrency:
  group: publish-cos-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.event.release.tag_name }}
      COS_BUCKET: ${{ vars.TENCENT_COS_BUCKET }}
      COS_REGION: ${{ vars.TENCENT_COS_REGION }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Require configured COS mirror
        shell: bash
        run: |
          set -euo pipefail
          test -n "$COS_BUCKET" || { echo "Missing repository variable TENCENT_COS_BUCKET."; exit 1; }
          test -n "$COS_REGION" || { echo "Missing repository variable TENCENT_COS_REGION."; exit 1; }
          [[ "$RELEASE_TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]] || {
            echo "Only stable SemVer releases can be mirrored: $RELEASE_TAG"
            exit 1
          }

      - name: Checkout exact published tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-cos-publish.txt

      - name: Confirm release is published and stable
        shell: bash
        run: |
          set -euo pipefail
          test "$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft)" = "false" || {
            echo "COS publication is forbidden while the GitHub Release is a draft."
            exit 1
          }
          test "$(gh release view "$RELEASE_TAG" --json isPrerelease --jq .isPrerelease)" = "false" || {
            echo "Prereleases are not promoted to the stable COS endpoint."
            exit 1
          }

      - name: Download and verify signed GitHub Release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir mirror-assets
          gh release download "$RELEASE_TAG" \
            --dir mirror-assets \
            --pattern "Forming-Grinder-CAD_*_x64-setup.exe*" \
            --pattern "latest.json" \
            --pattern "SHA256SUMS.txt"
          mapfile -t installers < <(
            find mirror-assets -maxdepth 1 -type f \
              -name "Forming-Grinder-CAD_*_x64-setup.exe" -print
          )
          test "${#installers[@]}" -eq 1 || {
            echo "Expected exactly one signed Windows installer."
            exit 1
          }
          test -s "${installers[0]}.sig" || {
            echo "Updater signature is missing."
            exit 1
          }
          (
            cd mirror-assets
            sha256sum --check SHA256SUMS.txt
          )
          echo "COS_INSTALLER=${installers[0]}" >> "$GITHUB_ENV"

      - name: Generate COS-specific signed updater manifest
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          release_base="https://${COS_BUCKET}.cos.${COS_REGION}.myqcloud.com/updates/releases/${RELEASE_TAG}"
          python scripts/generate_latest_json.py \
            --version "$version" \
            --download-base-url "$release_base" \
            --installer "$COS_INSTALLER" \
            --notes "See the GitHub Release notes for details." \
            --output mirror-assets/latest-cos.json

      - name: Install pinned Tencent COS publisher SDK
        run: python -m pip install -r requirements-cos-publish.txt

      - name: Publish immutable files and promote stable manifest
        env:
          TENCENT_COS_SECRET_ID: ${{ secrets.TENCENT_COS_SECRET_ID }}
          TENCENT_COS_SECRET_KEY: ${{ secrets.TENCENT_COS_SECRET_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/publish_release_to_cos.py \
            --bucket "$COS_BUCKET" \
            --region "$COS_REGION" \
            --tag "$RELEASE_TAG" \
            --installer "$COS_INSTALLER" \
            --manifest mirror-assets/latest-cos.json

      - name: Write mirror summary
        shell: bash
        run: |
          {
            echo "### Tencent COS stable mirror"
            echo
            echo "- Release: \`$RELEASE_TAG\`"
            echo "- Bucket: \`$COS_BUCKET\`"
            echo "- Region: \`$COS_REGION\`"
            echo "- Endpoint: \`https://${COS_BUCKET}.cos.${COS_REGION}.myqcloud.com/updates/stable/latest.json\`"
            echo "- Promotion order: signed installer → signature → versioned manifest → stable manifest"
          } >> "$GITHUB_STEP_SUMMARY"
