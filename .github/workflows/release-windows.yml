name: Release Windows desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing SemVer tag to release, for example v1.0.0"
        required: true
        type: string

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - name: Checkout exact release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Verify tag points at checked-out commit
        shell: pwsh
        run: |
          $tagCommit = git rev-list -n 1 $env:RELEASE_TAG
          $headCommit = git rev-parse HEAD
          if ($tagCommit -ne $headCommit) { throw "Release tag does not match checked-out commit SHA." }

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-packaging.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Require real updater signing secrets
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "Missing TAURI_SIGNING_PRIVATE_KEY GitHub Secret. Unsigned releases are forbidden."
          }
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD)) {
            throw "Missing TAURI_SIGNING_PRIVATE_KEY_PASSWORD GitHub Secret."
          }
          if ((Get-Content src-tauri/tauri.conf.json -Raw) -match "REPLACE_WITH_TAURI_UPDATER_PUBLIC_KEY") {
            throw "Replace the updater public-key placeholder in src-tauri/tauri.conf.json before releasing."
          }

      - name: Verify unified SemVer
        run: python scripts/check_versions.py --tag $env:RELEASE_TAG

      - name: Install Python dependencies
        run: python -m pip install -r requirements-packaging.txt

      - name: Run full Python tests
        env:
          MPLCONFIGDIR: ${{ runner.temp }}\matplotlib
        run: python -m pytest

      - name: Run all seven machine regressions
        env:
          MPLCONFIGDIR: ${{ runner.temp }}\matplotlib
        run: |
          python scripts/run_regression_tests.py
          python -c "import json; p=json.load(open('tests/regression/regression_summary.json', encoding='utf-8')); assert p['total_cases']==7 and p['passed']==7 and p['failed']==0, p"

      - name: Install and audit frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build
          npm audit --audit-level=low

      - name: Build PyInstaller onedir sidecar
        run: python -m PyInstaller --noconfirm --clean packaging/pyinstaller/forming_grinder_cad.spec

      - name: Smoke-test packaged sidecar health and shutdown
        run: python scripts/smoke_sidecar.py dist/forming_grinder_cad_sidecar/forming_grinder_cad_sidecar.exe

      - name: Optionally import Authenticode certificate
        id: authenticode
        if: ${{ env.WINDOWS_CERTIFICATE != '' }}
        shell: pwsh
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP "windows-signing.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $password = ConvertTo-SecureString $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force
          $certificate = Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $password
          "thumbprint=$($certificate.Thumbprint)" >> $env:GITHUB_OUTPUT
          Remove-Item $pfx -Force

      - name: Create optional Windows signing config
        if: ${{ steps.authenticode.outputs.thumbprint != '' }}
        shell: pwsh
        env:
          CERTIFICATE_THUMBPRINT: ${{ steps.authenticode.outputs.thumbprint }}
        run: |
          @{ bundle = @{ windows = @{ certificateThumbprint = $env:CERTIFICATE_THUMBPRINT; digestAlgorithm = "sha256"; timestampUrl = "http://timestamp.digicert.com" } } } |
            ConvertTo-Json -Depth 5 | Set-Content -Encoding utf8 $env:RUNNER_TEMP\tauri-signing.json

      - name: Build signed Tauri NSIS installer
        shell: pwsh
        run: |
          $arguments = @("build", "--bundles", "nsis")
          if (Test-Path "$env:RUNNER_TEMP\tauri-signing.json") { $arguments += @("--config", "$env:RUNNER_TEMP\tauri-signing.json") }
          & frontend/node_modules/.bin/tauri.cmd @arguments

      - name: Generate latest.json, build summary, and SHA-256 checksums
        shell: pwsh
        run: |
          $version = $env:RELEASE_TAG.TrimStart('v')
          $installer = Get-ChildItem src-tauri/target/release/bundle/nsis/*-setup.exe | Select-Object -First 1
          if (-not $installer) { throw "NSIS setup.exe was not generated." }
          python scripts/generate_latest_json.py --version $version --repository $env:GITHUB_REPOSITORY --installer $installer.FullName --output latest.json
          $files = @($installer.FullName, "$($installer.FullName).sig", "latest.json")
          $files | ForEach-Object { Get-FileHash $_ -Algorithm SHA256 } |
            ForEach-Object { "$($_.Hash.ToLower())  $([IO.Path]::GetFileName($_.Path))" } |
            Set-Content -Encoding ascii SHA256SUMS.txt
          @(
            "commit_sha=$env:GITHUB_SHA",
            "release_tag=$env:RELEASE_TAG",
            "python=$((python --version) 2>&1)",
            "node=$(node --version)",
            "rust=$(rustc --version)",
            "machine_regressions=7/7"
          ) | Set-Content -Encoding utf8 BUILD-SUMMARY.txt
          "installer=$($installer.FullName)" >> $env:GITHUB_ENV

      - name: Attest release installer
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ env.installer }}

      - name: Create GitHub Release and upload signed artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: Forming Grinder CAD ${{ env.RELEASE_TAG }}
          draft: true
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/bundle/nsis/*-setup.exe.sig
            latest.json
            SHA256SUMS.txt
            BUILD-SUMMARY.txt
